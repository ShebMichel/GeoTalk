<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
#main-container {
    width: 100%;
    height: 520px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
#scene-container {
    width: 100%;
    height: 320px;
    position: relative;
    flex-shrink: 0;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
#subtitle-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    color: #fff;
    padding: 10px 16px;
    font-size: 13px;
    line-height: 1.4;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
}
#subtitle-bar .speaker-name {
    font-weight: 700;
    color: #4fc3f7;
    white-space: nowrap;
    flex-shrink: 0;
}
#subtitle-bar .speaker-text {
    color: #e0e0e0;
}
.speaker-indicator {
    position: absolute;
    top: 10px;
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    backdrop-filter: blur(4px);
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0.5;
}
.speaker-indicator.active {
    opacity: 1;
    transform: scale(1.08);
}
#speaker-left { left: 10px; background: rgba(76, 175, 80, 0.85); }
#speaker-right { right: 10px; background: rgba(156, 39, 176, 0.85); }

#status-badge {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    padding: 4px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    font-size: 11px;
    color: rgba(255,255,255,0.8);
}

/* --- Controls bar --- */
#controls-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: #1e1e2e;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
}
#play-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: #4fc3f7;
    color: #111;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
#play-btn:hover { background: #81d4fa; }
#progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
}
#progress-fill {
    height: 100%;
    background: #4fc3f7;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s linear;
}
#time-display {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    flex-shrink: 0;
}

/* --- Transcript log --- */
#transcript-panel {
    flex: 1;
    overflow-y: auto;
    background: #12121e;
    padding: 10px 14px;
    min-height: 0;
}
#transcript-panel::-webkit-scrollbar { width: 6px; }
#transcript-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
#transcript-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    background: #16162a;
    cursor: pointer;
    user-select: none;
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
}
#transcript-toggle span {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
}
#transcript-toggle .arrow {
    transition: transform 0.2s;
    color: rgba(255,255,255,0.5);
}
#transcript-toggle.collapsed .arrow { transform: rotate(180deg); }

.transcript-line {
    padding: 6px 0;
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255,255,255,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: color 0.3s, background 0.3s;
}
.transcript-line.active {
    color: #fff;
    background: rgba(79, 195, 247, 0.08);
    border-radius: 6px;
    padding: 6px 8px;
}
.transcript-line.past {
    color: rgba(255,255,255,0.6);
}
.transcript-line .tl-speaker {
    font-weight: 700;
    color: #4fc3f7;
}
.transcript-line.speaker-b .tl-speaker {
    color: #ce93d8;
}
</style>
</head>
<body>
<div id="main-container">
    <div id="scene-container">
        <canvas id="robot-canvas"></canvas>
        <div id="speaker-left" class="speaker-indicator">Speaker A</div>
        <div id="speaker-right" class="speaker-indicator">Speaker B</div>
        <div id="status-badge">🎙️ GeoTalk Live</div>
        <div id="subtitle-bar">
            <span class="speaker-name" id="sub-speaker"></span>
            <span class="speaker-text" id="sub-text">Waiting for episode...</span>
        </div>
    </div>
    <div id="controls-bar">
        <button id="play-btn">▶</button>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <span id="time-display">0:00 / 0:00</span>
    </div>
    <div id="transcript-toggle">
        <span>📜 Transcript</span>
        <span class="arrow">▼</span>
    </div>
    <div id="transcript-panel"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Scene Setup ---
const sceneContainer = document.getElementById('scene-container');
const canvas = document.getElementById('robot-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(sceneContainer.clientWidth, sceneContainer.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, sceneContainer.clientWidth / sceneContainer.clientHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 0.8, 0);

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x404060, 0.8));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(3, 5, 4);
keyLight.castShadow = true;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x4fc3f7, 0.4);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);
scene.add(new THREE.PointLight(0xff6f61, 0.6, 10).translateY(3).translateZ(-3));

// --- Floor ---
const floor = new THREE.Mesh(
    new THREE.CircleGeometry(4, 64),
    new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// --- Robot Builder ---
function createRobot(color, x) {
    const group = new THREE.Group();
    const mainColor = new THREE.Color(color);
    const darkColor = mainColor.clone().multiplyScalar(0.5);

    const bodyMat = new THREE.MeshStandardMaterial({ color: mainColor, roughness: 0.3, metalness: 0.6 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.9, 16), bodyMat);
    body.position.y = 0.7; body.castShadow = true;
    group.add(body);

    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.32, 0.03, 8, 32),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.8 })
    );
    ring.position.y = 0.9; ring.rotation.x = Math.PI / 2;
    group.add(ring);

    const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.12, 0.15, 12),
        new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.7 })
    );
    neck.position.y = 1.22;
    group.add(neck);

    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.28, 24, 24),
        new THREE.MeshStandardMaterial({ color: mainColor, roughness: 0.3, metalness: 0.5 })
    );
    head.position.y = 1.5; head.castShadow = true;
    group.add(head);

    // Eyes
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 });
    const eyeRingMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2 });
    for (const ex of [-0.1, 0.1]) {
        group.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), eyeMat), { position: new THREE.Vector3(ex, 1.52, 0.24) }));
        group.add(Object.assign(new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.015, 8, 16), eyeRingMat), { position: new THREE.Vector3(ex, 1.52, 0.24) }));
    }

    // Antennas
    const antMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 });
    const leftAnt = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.02, 0.3, 8), antMat);
    leftAnt.position.set(-0.12, 1.85, 0); leftAnt.rotation.z = 0.2;
    group.add(leftAnt);
    const rightAnt = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.02, 0.3, 8), antMat);
    rightAnt.position.set(0.12, 1.85, 0); rightAnt.rotation.z = -0.2;
    group.add(rightAnt);

    // Antenna tips
    const tipMat = new THREE.MeshStandardMaterial({ color: mainColor, emissive: mainColor, emissiveIntensity: 0.5, roughness: 0.2 });
    const leftTip = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 12), tipMat);
    leftTip.position.set(-0.15, 2.0, 0);
    group.add(leftTip);
    const rightTip = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 12), tipMat);
    rightTip.position.set(0.15, 2.0, 0);
    group.add(rightTip);

    // Base
    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.4, 0.15, 16),
        new THREE.MeshStandardMaterial({ color: darkColor, roughness: 0.4, metalness: 0.6 })
    );
    base.position.y = 0.15; base.castShadow = true;
    group.add(base);

    // Speaker grille
    group.add(Object.assign(
        new THREE.Mesh(new THREE.CircleGeometry(0.12, 24), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, side: THREE.DoubleSide })),
        { position: new THREE.Vector3(0, 0.6, 0.35) }
    ));

    group.position.x = x;
    group.userData = { head, leftAnt, rightAnt, leftTip, rightTip, tipMat, body, talkPhase: 0 };
    scene.add(group);
    return group;
}

const robotA = createRobot(0x4caf50, -1.2);
const robotB = createRobot(0x9c27b0, 1.2);
robotA.rotation.y = 0.3;
robotB.rotation.y = -0.3;

// --- Animation ---
let currentSpeaker = -1;

function idleAnim(robot, time, offset) {
    const d = robot.userData;
    robot.position.y = Math.sin(time * 0.8 + offset) * 0.02;
    d.leftAnt.rotation.z = 0.2 + Math.sin(time * 1.2 + offset) * 0.05;
    d.rightAnt.rotation.z = -0.2 + Math.sin(time * 1.2 + offset + 1) * 0.05;
    d.tipMat.emissiveIntensity = 0.3 + Math.sin(time * 2) * 0.1;
}

function talkAnim(robot, time) {
    const d = robot.userData;
    d.talkPhase += 0.15;
    d.head.position.y = 1.5 + Math.sin(d.talkPhase * 3) * 0.02;
    d.head.rotation.x = Math.sin(d.talkPhase * 2) * 0.05;
    d.head.rotation.z = Math.sin(d.talkPhase * 1.5) * 0.03;
    d.leftAnt.rotation.z = 0.2 + Math.sin(d.talkPhase * 4) * 0.15;
    d.rightAnt.rotation.z = -0.2 + Math.sin(d.talkPhase * 4 + 1) * 0.15;
    d.tipMat.emissiveIntensity = 0.5 + Math.sin(d.talkPhase * 5) * 0.4;
    robot.rotation.x = Math.sin(d.talkPhase * 1.2) * 0.03;
}

function listenAnim(robot, time) {
    const d = robot.userData;
    d.head.rotation.z = Math.sin(time * 0.5) * 0.08;
    d.head.rotation.x = -0.05;
    d.tipMat.emissiveIntensity = 0.3;
}

function animate() {
    requestAnimationFrame(animate);
    const t = performance.now() / 1000;
    if (currentSpeaker === 0) { talkAnim(robotA, t); listenAnim(robotB, t); }
    else if (currentSpeaker === 1) { talkAnim(robotB, t); listenAnim(robotA, t); }
    else { idleAnim(robotA, t, 0); idleAnim(robotB, t, Math.PI); }
    renderer.render(scene, camera);
}
animate();

// --- Resize ---
function onResize() {
    const w = sceneContainer.clientWidth, h = sceneContainer.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(sceneContainer);

// --- Audio + Timeline Engine ---
let audioEl = null;
let timeline = [];
let totalDuration = 0;
let activeLineIdx = -1;

const playBtn = document.getElementById('play-btn');
const progressFill = document.getElementById('progress-fill');
const progressBar = document.getElementById('progress-bar');
const timeDisplay = document.getElementById('time-display');
const transcriptPanel = document.getElementById('transcript-panel');
const transcriptToggle = document.getElementById('transcript-toggle');

// Transcript toggle
let transcriptExpanded = true;
transcriptToggle.addEventListener('click', () => {
    transcriptExpanded = !transcriptExpanded;
    transcriptPanel.style.display = transcriptExpanded ? 'block' : 'none';
    transcriptToggle.classList.toggle('collapsed', !transcriptExpanded);
});

// Play/pause
playBtn.addEventListener('click', () => {
    if (!audioEl) return;
    if (audioEl.paused) { audioEl.play(); playBtn.textContent = '⏸'; }
    else { audioEl.pause(); playBtn.textContent = '▶'; }
});

// Progress bar seek
progressBar.addEventListener('click', (e) => {
    if (!audioEl || !totalDuration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audioEl.currentTime = pct * totalDuration;
});

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function updatePlayback() {
    if (!audioEl || audioEl.paused) return;
    const elapsed = audioEl.currentTime;
    
    // Progress
    const pct = totalDuration > 0 ? (elapsed / totalDuration) * 100 : 0;
    progressFill.style.width = pct + '%';
    timeDisplay.textContent = `${formatTime(elapsed)} / ${formatTime(totalDuration)}`;
    
    // Find active line
    let newActive = -1;
    for (let i = 0; i < timeline.length; i++) {
        if (elapsed >= timeline[i].startTime && elapsed < timeline[i].startTime + timeline[i].duration) {
            newActive = i;
            break;
        }
    }
    
    if (newActive !== activeLineIdx) {
        activeLineIdx = newActive;
        if (newActive >= 0) {
            const item = timeline[newActive];
            currentSpeaker = item.speakerIdx;
            updateSubtitle(item.speaker, item.line);
            updateTranscriptHighlight(newActive);
            updateSpeakerIndicators(item.speakerIdx);
        }
    }
    
    requestAnimationFrame(updatePlayback);
}

function updateSubtitle(speaker, line) {
    document.getElementById('sub-speaker').textContent = speaker + ':';
    document.getElementById('sub-text').textContent = line;
}

function updateSpeakerIndicators(idx) {
    document.getElementById('speaker-left').classList.toggle('active', idx === 0);
    document.getElementById('speaker-right').classList.toggle('active', idx === 1);
}

function updateTranscriptHighlight(idx) {
    const lines = transcriptPanel.querySelectorAll('.transcript-line');
    lines.forEach((el, i) => {
        el.classList.toggle('active', i === idx);
        el.classList.toggle('past', i < idx);
    });
    // Auto-scroll to active line
    if (lines[idx]) {
        lines[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

function buildTranscript(data) {
    transcriptPanel.innerHTML = '';
    data.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'transcript-line' + (item.speakerIdx === 1 ? ' speaker-b' : '');
        div.innerHTML = `<span class="tl-speaker">${item.speaker}:</span> ${item.line}`;
        transcriptPanel.appendChild(div);
    });
}

// --- Public API ---
window.GeoTalkRobots = {
    /**
     * Load episode data and auto-play.
     * @param {Array} data - [{speaker, line, duration, speakerIdx}]
     * @param {string} speakerAName 
     * @param {string} speakerBName
     * @param {string} audioUrl - URL/data URI of the combined audio
     */
    start(data, speakerAName, speakerBName, audioUrl) {
        // Set speaker labels
        document.getElementById('speaker-left').textContent = speakerAName || 'Speaker A';
        document.getElementById('speaker-right').textContent = speakerBName || 'Speaker B';

        // Build timeline
        timeline = [];
        let cumTime = 0;
        for (const item of data) {
            timeline.push({ ...item, startTime: cumTime });
            cumTime += item.duration;
        }
        totalDuration = cumTime;
        timeDisplay.textContent = `0:00 / ${formatTime(totalDuration)}`;

        // Build transcript log
        buildTranscript(data);

        // Create audio element and auto-play
        if (audioEl) { audioEl.pause(); audioEl.remove(); }
        audioEl = new Audio(audioUrl);
        audioEl.addEventListener('play', () => { playBtn.textContent = '⏸'; requestAnimationFrame(updatePlayback); });
        audioEl.addEventListener('pause', () => { playBtn.textContent = '▶'; });
        audioEl.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            currentSpeaker = -1;
            document.getElementById('sub-text').textContent = '✅ Episode complete!';
            document.getElementById('sub-speaker').textContent = '';
            updateSpeakerIndicators(-1);
        });

        // Auto-play
        audioEl.play().catch(() => {
            // Autoplay blocked - show play button prompt
            document.getElementById('sub-text').textContent = '▶ Press play to start the episode';
        });
    },

    stop() {
        if (audioEl) { audioEl.pause(); }
        currentSpeaker = -1;
    },

    idle(message) {
        currentSpeaker = -1;
        document.getElementById('sub-speaker').textContent = '';
        document.getElementById('sub-text').textContent = message || 'Waiting for episode...';
        updateSpeakerIndicators(-1);
        progressFill.style.width = '0%';
        timeDisplay.textContent = '0:00 / 0:00';
        transcriptPanel.innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:12px;padding:10px;">${message || 'Transcript will appear here...'}</div>`;
    }
};

// Initial state
window.GeoTalkRobots.idle();
</script>
</body>
</html>
